services:
  - type: web
    name: codeward-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm run start:api
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false

  - type: worker
    name: codeward-worker
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm run start:worker
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
