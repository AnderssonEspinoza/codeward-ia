services:
  postgres:
    image: postgres:16-alpine
    container_name: codeguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - codeguard_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codeguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - codeguard_redis_data:/data

volumes:
  codeguard_postgres_data:
  codeguard_redis_data:
